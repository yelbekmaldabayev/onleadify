<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes logoSpinCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes logoSpinCCW {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }
    .logo-white-orbit {
      transform-origin: 20px 20px;
      animation: logoSpinCW 10s linear infinite;
    }
    .logo-purple-orbit {
      transform-origin: 20px 20px;
      animation: logoSpinCCW 8s linear infinite;
    }
  </style>
  <defs>
    <filter id="logo-glow-white" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="logo-glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="logo-gradient" x1="8" y1="8" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e4e4e7"/>
    </linearGradient>
    <linearGradient id="logo-gradient-2" x1="2" y1="20" x2="38" y2="20" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <ellipse class="logo-white-orbit" cx="20" cy="20" rx="14" ry="5" stroke="url(#logo-gradient)" stroke-width="2" fill="none" filter="url(#logo-glow-white)" transform="rotate(60 20 20)"/>
  <ellipse class="logo-purple-orbit" cx="20" cy="20" rx="16" ry="6" stroke="url(#logo-gradient-2)" stroke-width="2.5" fill="none" filter="url(#logo-glow-purple)" transform="rotate(-30 20 20)"/>
</svg>
